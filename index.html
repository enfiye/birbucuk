<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>birbuçuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Lato', 'Helvetica Neue', Arial, sans-serif; background: #fff; color: #111; display: flex; flex-direction: column; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .topbar { height: 4px; background: #CC0000; }
  main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4rem 2rem; }
  h1 { font-size: 5rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 3rem; }
  h1 span { color: #CC0000; }
  .langs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #111; border: 1.5px solid #111; width: 100%; max-width: 720px; }
  .langs a { background: #fff; padding: 2rem; text-decoration: none; text-align: center; transition: background 0.12s; }
  .langs a:hover { background: #fafafa; }
  .langs a .code { font-size: 1.4rem; font-weight: 900; color: #111; letter-spacing: 0.05em; display: block; }
  .langs a .name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #777; margin-top: 0.25rem; display: block; }
  .langs a:hover .code { color: #CC0000; }
  footer { border-top: 1px solid #ddd; padding: 1rem 2rem; text-align: center; font-size: 0.72rem; color: #777; font-weight: 300; }
  @media (max-width: 480px) { h1 { font-size: 3rem; } .langs { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="topbar"></div>
<main>
  <h1><span>bir</span>buçuk</h1>
  <div class="langs">
    <a href="tr/"><span class="code">TR</span><span class="name">Türkçe</span></a>
    <a href="en/"><span class="code">EN</span><span class="name">English</span></a>
    <a href="fr/"><span class="code">FR</span><span class="name">Français</span></a>
    <a href="de/"><span class="code">DE</span><span class="name">Deutsch</span></a>
    <a href="es/"><span class="code">ES</span><span class="name">Español</span></a>
    <a href="it/"><span class="code">IT</span><span class="name">Italiano</span></a>
    <a href="pt/"><span class="code">PT</span><span class="name">Português</span></a>
    <a href="ar/"><span class="code">AR</span><span class="name">العربية</span></a>
    <a href="ku/"><span class="code">KU</span><span class="name">Kurdî</span></a>
  </div>
</main>
<footer><span style="color:#CC0000;font-weight:900;">bir</span>buçuk · İstanbul · ~2016</footer>
</body>
</html>
